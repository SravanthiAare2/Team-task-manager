<!DOCTYPE html>
<html>
<head>
    <title>Task Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <a href="/tasks" class="btn btn-secondary mb-3">← Back</a>

    <div class="card p-4">

        <h2>{{ task.title }}</h2>

        <p><b>Status:</b> {{ task.status }}</p>
        <p><b>Due Date:</b> {{ task.due_date }}</p>
        <p><b>Assigned To:</b> {{ task.assigned_to }}</p>

        <hr>

        <a href="/project/{{ project.id }}" class="btn btn-primary">
            View Project
        </a>

        <a href="/task/delete/{{ task.id }}" class="btn btn-danger"
           onclick="return confirm('Delete task?')">
            Delete Task
        </a>

    </div>

</div>

</body>
</html>
